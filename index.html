<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>防禦陣線：無盡星海</title>
    <style>
        /* 基礎與排版 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, sans-serif; user-select: none; -webkit-touch-callout: none; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; overflow: hidden; touch-action: none; }
        #game-container { width: 100%; max-width: 420px; height: 100%; max-height: 850px; background-color: #0a0d14; position: relative; overflow: hidden; border: 2px solid #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); display: flex; flex-direction: column; }
        .screen { flex: 1; display: none; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        
        /* 標題樣式 */
        h1 { text-align: center; font-size: 28px; margin-bottom: 10px; color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); letter-spacing: 2px; font-weight: 700; }
        .subtitle { text-align: center; font-size: 14px; color: #8a99ad; margin-bottom: 40px; }
        
        /* 主選單畫面 */
        #menu-screen { justify-content: center; align-items: center; background: radial-gradient(circle at center, #101a26 0%, #050811 100%); }
        .menu-btn { width: 220px; padding: 15px; margin: 12px 0; background: linear-gradient(135deg, #005f73 0%, #0a9396 100%); border: 1px solid #94d2bd; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        .menu-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        /* 遊戲戰場畫面 */
        #game-screen { padding: 0; display: none; flex-direction: column; height: 100%; position: relative; }
        #game-screen.active { display: flex; }
        
        /* 頂部狀態列 */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(10, 13, 20, 0.9); border-bottom: 1px solid rgba(0, 243, 255, 0.3); z-index: 10; font-size: 14px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-label { color: #8a99ad; font-weight: bold; }
        .stat-val { font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        #hp-val { color: #ff4d4d; }
        #energy-val { color: #ffd700; }
        #wave-val { color: #00f3ff; }
        
        /* 戰區畫布容器 */
        #canvas-container { flex: 1; position: relative; background-color: #05070c; outline: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 底部卡牌操控區 */
        #bottom-bar { padding: 12px 10px; background: rgba(10, 13, 20, 0.95); border-top: 1px solid rgba(0, 243, 255, 0.3); z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        #cards-container { display: flex; justify-content: space-between; gap: 8px; }
        
        .card { flex: 1; height: 82px; background: rgba(20, 30, 45, 0.7); border: 1px solid #1a365d; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: all 0.2s; overflow: hidden; }
        .card:active { transform: scale(0.95); }
        .card.selected { border-color: #00f3ff; background: rgba(0, 243, 255, 0.15); box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.3); }
        .card.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        
        .card-icon { font-size: 20px; margin-bottom: 2px; transition: transform 0.2s; }
        .card.selected .card-icon { transform: scale(1.1); }
        .card-name { font-size: 11px; color: #c4d1e6; margin-bottom: 2px; font-weight: bold; }
        .card-cost { font-size: 12px; color: #ffd700; font-weight: bold; display: flex; align-items: center; gap: 2px; }
        
        /* 補給冷卻與刷新特效 */
        .card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0, 243, 255, 0.1); transition: height 0.3s ease; pointer-events: none; }
        .card.refreshing::after { height: 100%; background: rgba(255, 215, 0, 0.15); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        
        /* 功能按鈕列 */
        #actions-container { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: all 0.15s; color: #fff; }
        #btn-speed-toggle { background: rgba(255, 215, 0, 0.1); border-color: rgba(255, 215, 0, 0.3); color: #ffd700; }
        #btn-speed-toggle:active { background: rgba(255, 215, 0, 0.25); }
        #btn-pause { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); color: #e2e8f0; }
        #btn-pause:active { background: rgba(255, 255, 255, 0.15); }
        
        /* 升級與販賣浮動懸浮層 */
        #upgrade-overlay { position: absolute; bottom: 125px; left: 50%; transform: translateX(-50%); background: rgba(10, 20, 30, 0.95); border: 1px solid #00f3ff; border-radius: 8px; padding: 10px 15px; display: none; gap: 15px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 20; width: 90%; max-width: 380px; }
        .overlay-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .overlay-title { font-size: 13px; font-weight: bold; color: #00f3ff; }
        .overlay-desc { font-size: 11px; color: #a0aec0; }
        .overlay-btns { display: flex; gap: 8px; }
        .overlay-btn { padding: 8px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; color: #fff; text-align: center; min-width: 70px; }
        .btn-upgrade-action { background: #48bb78; }
        .btn-upgrade-action:active { background: #38a169; }
        .btn-upgrade-action.maxed { background: #4a5568; cursor: not-allowed; opacity: 0.6; }
        .btn-sell-action { background: #f56565; }
        .btn-sell-action:active { background: #e53e3e; }
        
        /* 結束與過關畫面通用 */
        .result-screen { justify-content: center; align-items: center; background: rgba(5, 8, 15, 0.95); z-index: 100; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 30px; }
        .result-screen.active { display: flex; }
        .result-title { font-size: 32px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.2); letter-spacing: 2px; }
        #gameover-screen .result-title { color: #f56565; text-shadow: 0 0 15px rgba(245,101,101,0.4); }
        #victory-screen .result-title { color: #48bb78; text-shadow: 0 0 15px rgba(72,187,120,0.4); }
        .result-stat { font-size: 16px; color: #cbd5e0; margin: 6px 0; }
        .result-btn { width: 18px; min-width: 180px; padding: 12px; margin-top: 30px; background: #2b6cb0; border: 1px solid #63b3ed; border-radius: 6px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; }
        .result-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="menu-screen" class="screen active">
            <h1>防禦陣線</h1>
            <div class="subtitle">無盡星海 — 戰術防衛指揮端</div>
            <div class="menu-btn" onclick="switchScreen('game-screen'); startGameState();">進入星海戰區</div>
        </div>
        
        <div id="game-screen" class="screen">
            <div id="top-bar">
                <div class="stat-item">
                    <span class="stat-label">防禦點</span>
                    <span id="hp-val" class="stat-val">10/10</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">關卡波次</span>
                    <span id="wave-val" class="stat-val">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">量子補給</span>
                    <span id="energy-val" class="stat-val">5</span>
                </div>
            </div>
            
            <div id="canvas-container">
                <canvas id="game-canvas"></canvas>
                
                <div id="upgrade-overlay">
                    <div class="overlay-info">
                        <div id="overlay-tower-name" class="overlay-title">機槍塔 (Lv.1)</div>
                        <div id="overlay-tower-desc" class="overlay-desc">範圍: 120 | 傷害: 15</div>
                    </div>
                    <div class="overlay-btns">
                        <button id="btn-overlay-upgrade" class="overlay-btn btn-upgrade-action" onclick="upgradeSelectedTower()">升級</button>
                        <button id="btn-overlay-sell" class="overlay-btn btn-sell-action" onclick="sellSelectedTower()">拆除</button>
                    </div>
                </div>
            </div>
            
            <div id="bottom-bar">
                <div id="cards-container">
                    <div class="card" data-type="machineGun">
                        <div class="card-icon">⚡</div>
                        <div class="card-name">機槍塔</div>
                        <div class="card-cost">💵<span class="card-cost-num">3</span></div>
                    </div>
                    <div class="card" data-type="laser">
                        <div class="card-icon">🔥</div>
                        <div class="card-name">雷射塔</div>
                        <div class="card-cost">💵<span class="card-cost-num">5</span></div>
                    </div>
                    <div class="card" data-type="ice">
                        <div class="card-icon">❄️</div>
                        <div class="card-name">冰凍塔</div>
                        <div class="card-cost">💵<span class="card-cost-num">4</span></div>
                    </div>
                    <div class="card" data-type="sniper">
                        <div class="card-icon">🎯</div>
                        <div class="card-name">狙擊塔</div>
                        <div class="card-cost">💵<span class="card-cost-num">6</span></div>
                    </div>
                </div>
                
                <div id="actions-container">
                    <button id="btn-speed-toggle" class="action-btn" onclick="toggleGameSpeed()">▶ 1x</button>
                    <button id="btn-pause" class="action-btn" onclick="togglePauseState()">⏸ 暫停</button>
                </div>
            </div>
            
            <div id="gameover-screen" class="result-screen">
                <div class="result-title">陣線失守</div>
                <div class="result-stat">最終波次：<span id="go-wave">0</span></div>
                <div class="result-stat">消滅敵軍：<span id="go-kills">0</span></div>
                <button class="result-btn" onclick="hideResultScreens(); switchScreen('menu-screen');">返回主基地</button>
            </div>
            
            <div id="victory-screen" class="result-screen">
                <div class="result-title">戰役勝利</div>
                <div class="result-stat">防禦陣線完好無損！</div>
                <div class="result-stat">消滅全數星海敵軍</div>
                <button class="result-btn" onclick="hideResultScreens(); switchScreen('menu-screen');">重返榮耀</button>
            </div>
        </div>
        
    </div>

<script>
    // 遊戲基礎設定與資料庫
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    const TOWER_DATA = {
        machineGun: { cost: 3, range: 105, damage: 13, fireRate: 4, color: '#00f3ff', label: '機槍塔' },
        laser: { cost: 5, range: 95, damage: 1.8, fireRate: 60, color: '#ff00ff', label: '雷射塔' },
        ice: { cost: 4, range: 85, damage: 8, fireRate: 2.5, color: '#00ffaa', label: '冰凍塔' },
        sniper: { cost: 6, range: 170, damage: 65, fireRate: 0.8, color: '#ffaa00', label: '狙擊塔' }
    };

    const ENEMY_TYPES = [
        { type: 'scout', hp: 45, speed: 1.8, reward: 1, size: 8, color: '#ff4d4d', label: '偵查艦' },
        { type: 'frigate', hp: 120, speed: 1.1, reward: 1, size: 11, color: '#ff3333', label: '護衛艦' },
        { type: 'destroyer', hp: 350, speed: 0.6, reward: 2, size: 15, color: '#cc0000', label: '驅逐艦' },
        { type: 'boss', hp: 2200, speed: 0.35, reward: 5, size: 22, color: '#800000', label: '母艦首領' }
    ];

    // 固定邏輯路徑點 (以相對比例儲存，適應任何畫布解析度)
    const basePathRatio = [
        {x: 0.0, y: 0.25}, {x: 0.75, y: 0.25}, {x: 0.75, y: 0.55},
        {x: 0.2, y: 0.55},  {x: 0.2, y: 0.82},  {x: 1.0, y: 0.82}
    ];
    let path = [];

    // 遊戲運行即時狀態
    let gameState = {
        running: false, paused: false, gameSpeed: 1,
        hp: 10, maxHp: 10, energy: 5, wave: 1, maxWaves: 20,
        towers: [], enemies: [], bullets: [], lasers: [], particles: [],
        selectedTower: null, selectedCardType: null,
        spawnTimer: 0, spawnInterval: 90, enemiesSpawned: 0, totalEnemiesInWave: 0,
        killedCount: 0, energyRegenTimer: 0
    };
    
    let reqId = null;

    // 用於追蹤拖曳狀態的全域變數
    let isDraggingCard = false;
    let dragTowerType = null;
    let dragX = 0;
    let dragY = 0;

    // 切換畫布與選單頁面
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'menu-screen') stopGameState();
    }

    // 重新計算適應螢幕的高清畫布大小
    function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        // 根據即時尺寸建立絕對像素路徑
        path = basePathRatio.map(p => ({ x: p.x * canvas.width, y: p.y * canvas.height }));
    }

    // 初始化卡牌數值與事件監聽
    function initCardIcons() {
        document.querySelectorAll('.card').forEach(c => {
            const type = c.getAttribute('data-type');
            c.querySelector('.card-cost-num').innerText = TOWER_DATA[type].cost;
        });
    }

    // 更新頂部狀態列 UI
    function updateUIBars() {
        document.getElementById('hp-val').innerText = `${gameState.hp}/${gameState.maxHp}`;
        document.getElementById('energy-val').innerText = Math.floor(gameState.energy);
        document.getElementById('wave-val').innerText = gameState.wave;
        
        // 根據補給能源自動點亮或灰化卡牌
        document.querySelectorAll('.card').forEach(c => {
            const type = c.getAttribute('data-type');
            if (gameState.energy < TOWER_DATA[type].cost) {
                c.classList.add('disabled');
            } else {
                c.classList.remove('disabled');
            }
        });
    }

    // ==========================================
    // 核心修正：全新流暢的【點擊】+【拖移】雙重放置系統
    // ==========================================
    
    // 1. 卡牌點擊與拖動初始化
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('pointerdown', (e) => {
            const type = card.getAttribute('data-type');
            if (gameState.energy < TOWER_DATA[type].cost) return; // 能源不夠不觸發

            e.preventDefault(); // 阻斷瀏覽器預設滑動行為
            
            // 啟用卡牌選取狀態
            gameState.selectedCardType = type;
            dragTowerType = type;
            isDraggingCard = true;
            
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            // 隱藏場上的升級選單
            gameState.selectedTower = null;
            hideSellButton();
            
            // 計算初始拖移畫布內位置
            const rect = canvas.getBoundingClientRect();
            dragX = (e.clientX - rect.left) * (canvas.width / rect.width);
            dragY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });
    });

    // 2. 全域手指滑動偵測
    window.addEventListener('pointermove', (e) => {
        if (!isDraggingCard || !dragTowerType) return;
        
        const rect = canvas.getBoundingClientRect();
        dragX = (e.clientX - rect.left) * (canvas.width / rect.width);
        dragY = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    // 3. 全域放開手指偵測（拖移到場上直接放開即放置角色）
    window.addEventListener('pointerup', (e) => {
        if (!isDraggingCard) return;
        isDraggingCard = false;
        
        const rect = canvas.getBoundingClientRect();
        // 如果手指放開的位置剛好在畫布內部
        if (e.clientX >= rect.left && e.clientX <= rect.right &&
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
            
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // 呼叫核心放置函數
            executePlaceTower(x, y, dragTowerType);
            
            // 放置成功後清除選取標籤
            dragTowerType = null;
            gameState.selectedCardType = null;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        }
        // 如果是在外面放開且沒有大幅移動，保留選取，進入「先點卡牌、再點空地」的點擊放置模式
    });

    // 4. 畫布獨立點擊/點觸事件（用於點擊空地放塔，或點選老塔升級）
    canvas.addEventListener('pointerdown', (e) => {
        if (!gameState.running || gameState.paused) return;
        if (isDraggingCard) return; // 如果正在從卡牌滑進來，交給全域 pointerup 處理

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        // A. 優先檢查是否點選到場上現有的塔
        let clickedTower = null;
        for (let t of gameState.towers) {
            if (Math.hypot(t.x - x, t.y - y) < 22) {
                clickedTower = t;
                break;
            }
        }

        if (clickedTower) {
            gameState.selectedTower = clickedTower;
            showSellButton(clickedTower);
            // 清除卡牌選取
            gameState.selectedCardType = null;
            dragTowerType = null;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        } else {
            // B. 如果先前有點選卡牌，現在點擊畫布空地
            if (gameState.selectedCardType) {
                executePlaceTower(x, y, gameState.selectedCardType);
                
                // 放置後清空選取
                gameState.selectedCardType = null;
                dragTowerType = null;
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            } else {
                // C. 純點空地 -> 關閉現有升級選單
                gameState.selectedTower = null;
                hideSellButton();
            }
        }
    });

    // 5. 核心放置角色方法：供點擊與拖曳通用，保障資料完整度
    function executePlaceTower(x, y, type) {
        if (!type || !TOWER_DATA[type]) return;
        const cost = TOWER_DATA[type].cost;
        
        if (gameState.energy >= cost && isValidPosition(x, y)) {
            gameState.towers.push({
                id: Date.now() + Math.floor(Math.random() * 1000),
                x: x, y: y,
                type: type, level: 1,
                range: TOWER_DATA[type].range,
                lastShot: 0, laserTarget: null
            });
            gameState.energy -= cost;
            updateUIBars();
        }
    }

    // ==========================================
    // 防禦塔合法放置檢查 (不能超出畫布、不能重疊、不能離路徑太近)
    // ==========================================
    function isValidPosition(x, y) {
        if (x < 15 || x > canvas.width - 15 || y < 15 || y > canvas.height - 15) return false;
        
        // 不能太接近怪物的行軍路徑
        for (let i = 0; i < path.length - 1; i++) {
            const p1 = path[i]; const p2 = path[i + 1];
            if (distToSegment({x, y}, p1, p2) < 25) return false;
        }
        
        // 不能與其他老塔完全重疊
        for (let t of gameState.towers) {
            if (Math.hypot(t.x - x, t.y - y) < 28) return false;
        }
        return true;
    }

    // 點至線段的距離演算法
    function distToSegment(p, v, w) {
        const l2 = Math.hypot(v.x - w.x, v.y - w.y) ** 2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    // ==========================================
    // 升級與拆除系統 (原本功能完整保留)
    // ==========================================
    function showSellButton(tower) {
        const overlay = document.getElementById('upgrade-overlay');
        const nameNode = document.getElementById('overlay-tower-name');
        const descNode = document.getElementById('overlay-tower-desc');
        const upBtn = document.getElementById('btn-overlay-upgrade');
        
        overlay.style.display = 'flex';
        const label = TOWER_DATA[tower.type].label;
        nameNode.innerText = `${label} (Lv.${tower.level})`;
        
        if (tower.level >= 3) {
            descNode.innerText = `已升至最高等級 | 拆除可得 💵${Math.floor(TOWER_DATA[tower.type].cost * 0.6)}`;
            upBtn.innerText = "MAX";
            upBtn.classList.add('maxed');
        } else {
            const nextCost = Math.floor(TOWER_DATA[tower.type].cost * 1.2);
            descNode.innerText = `升級花費: 💵${nextCost} | 拆除返還: 💵${Math.floor(TOWER_DATA[tower.type].cost * 0.5 * tower.level)}`;
            upBtn.innerText = `升級 (💵${nextCost})`;
            upBtn.classList.remove('maxed');
        }
    }

    function hideSellButton() {
        document.getElementById('upgrade-overlay').style.display = 'none';
    }

    function upgradeSelectedTower() {
        if (!gameState.selectedTower || gameState.selectedTower.level >= 3) return;
        const t = gameState.selectedTower;
        const upCost = Math.floor(TOWER_DATA[t.type].cost * 1.2);
        
        if (gameState.energy >= upCost) {
            gameState.energy -= upCost;
            t.level += 1;
            t.range *= 1.15; // 升級範圍增加
            createUpgradeParticles(t.x, t.y);
            showSellButton(t);
            updateUIBars();
        }
    }

    function sellSelectedTower() {
        if (!gameState.selectedTower) return;
        const t = gameState.selectedTower;
        const refund = Math.floor(TOWER_DATA[t.type].cost * 0.5 * t.level);
        
        gameState.energy += refund;
        gameState.towers = gameState.towers.filter(item => item.id !== t.id);
        gameState.selectedTower = null;
        hideSellButton();
        updateUIBars();
    }

    // ==========================================
    // 遊戲核心主迴圈引擎與物理演算法
    // ==========================================
    function startGameState() {
        setTimeout(() => {
            resizeCanvas();
            initCardIcons();
            
            gameState.running = true; gameState.paused = false; gameState.gameSpeed = 1;
            gameState.hp = 10; gameState.energy = 6; gameState.wave = 1;
            gameState.towers = []; gameState.enemies = []; gameState.bullets = []; gameState.lasers = []; gameState.particles = [];
            gameState.selectedTower = null; gameState.selectedCardType = null;
            gameState.killedCount = 0;
            
            document.getElementById('btn-speed-toggle').innerText = "▶ 1x";
            document.getElementById('btn-speed-toggle').style.background = "rgba(255, 215, 0, 0.1)";
            
            generateWaveData();
            updateUIBars();
            
            cancelAnimationFrame(reqId);
            reqId = requestAnimationFrame(gameStateLoop);
        }, 60);
    }

    function stopGameState() { gameState.running = false; cancelAnimationFrame(reqId); }
    function togglePauseState() {
        gameState.paused = !gameState.paused;
        document.getElementById('btn-pause').innerText = gameState.paused ? "▶ 繼續" : "⏸ 暫停";
    }
    function toggleGameSpeed() {
        gameState.gameSpeed = gameState.gameSpeed === 1 ? 2 : gameState.gameSpeed === 2 ? 4 : 1;
        document.getElementById('btn-speed-toggle').innerText = `▶ ${gameState.gameSpeed}x`;
    }

    function generateWaveData() {
        gameState.enemiesSpawned = 0;
        gameState.spawnTimer = 0;
        // 隨波次線性增長敵人總數量
        gameState.totalEnemiesInWave = 6 + gameState.wave * 3;
        // 隨波次縮短生成間隔
        gameState.spawnInterval = Math.max(30, 90 - gameState.wave * 4);
    }

    // 主要框架心跳更新器
    function gameStateLoop(timestamp) {
        if (!gameState.running) return;
        
        const loops = gameState.paused ? 0 : gameState.gameSpeed;
        for (let l = 0; l < loops; l++) {
            updateGamePhysics();
        }
        
        drawGameScene();
        reqId = requestAnimationFrame(gameStateLoop);
    }

    // 處理所有子彈移動、怪獸尋路與傷害物理
    function updateGamePhysics() {
        // 自然能源恢復
        gameState.energyRegenTimer++;
        if (gameState.energyRegenTimer >= 75) { 
            gameState.energy = Math.min(25, gameState.energy + 1);
            gameState.energyRegenTimer = 0;
            updateUIBars();
        }

        // 刷怪計時器
        if (gameState.enemiesSpawned < gameState.totalEnemiesInWave) {
            gameState.spawnTimer++;
            if (gameState.spawnTimer >= gameState.spawnInterval) {
                spawnEnemy();
                gameState.spawnTimer = 0;
            }
        }

        // 1. 移動敵軍
        for (let i = gameState.enemies.length - 1; i >= 0; i--) {
            const e = gameState.enemies[i];
            const targetPoint = path[e.pathIndex];
            const dist = Math.hypot(targetPoint.x - e.x, targetPoint.y - e.y);
            
            if (dist <= e.speed) {
                e.x = targetPoint.x; e.y = targetPoint.y;
                e.pathIndex++;
                if (e.pathIndex >= path.length) {
                    // 闖關成功，扣除玩家血量
                    gameState.hp -= (e.type === 'boss' ? 5 : 1);
                    if (gameState.hp <= 0) { gameState.hp = 0; doGameOver(); }
                    gameState.enemies.splice(i, 1);
                    updateUIBars();
                    checkWaveEndCondition();
                    continue;
                }
            } else {
                e.x += ((targetPoint.x - e.x) / dist) * e.speed;
                e.y += ((targetPoint.y - e.y) / dist) * e.speed;
            }
            
            // 冰凍減速消退回復
            if (e.slowDuration > 0) {
                e.slowDuration--;
                if (e.slowDuration <= 0) e.speed = e.baseSpeed;
            }
        }

        // 2. 防禦塔點名開火
        gameState.lasers = []; // 每幀排空雷射射線
        gameState.towers.forEach(t => {
            const data = TOWER_DATA[t.type];
            let baseDamage = data.damage * (1 + (t.level - 1) * 0.4);
            
            // 尋找最近的敵人
            let target = null;
            let minDist = t.range;
            
            gameState.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) { minDist = d; target = e; }
            });

            if (target) {
                if (t.type === 'laser') {
                    // 雷射持續每幀照射傷害
                    target.hp -= baseDamage;
                    gameState.lasers.push({ sx: t.x, sy: t.y, tx: target.x, ty: target.y, color: data.color });
                    if (target.hp <= 0) killEnemy(target);
                } else {
                    // 彈射類防禦塔CD冷卻開槍
                    t.lastShot += (1 / 60);
                    if (t.lastShot >= (1 / data.fireRate)) {
                        if (t.type === 'ice') {
                            // 冰凍彈附帶緩速效果
                            gameState.bullets.push({ x: t.x, y: t.y, tx: target.x, ty: target.y, speed: 6, dmg: baseDamage, type: 'ice', color: data.color });
                        } else {
                            gameState.bullets.push({ x: t.x, y: t.y, tx: target.x, ty: target.y, speed: t.type === 'sniper' ? 12 : 7, dmg: baseDamage, type: 'normal', color: data.color });
                        }
                        t.lastShot = 0;
                    }
                }
            }
        });

        // 3. 子彈物理追蹤飛越
        for (let i = gameState.bullets.length - 1; i >= 0; i--) {
            const b = gameState.bullets[i];
            const dist = Math.hypot(b.tx - b.x, b.ty - b.y);
            
            if (dist <= b.speed) {
                // 子彈擊中目標，尋找該位置範圍內是否有任何敵人
                applySplashDamage(b.tx, b.ty, b.dmg, b.type);
                gameState.bullets.splice(i, 1);
            } else {
                b.x += ((b.tx - b.x) / dist) * b.speed;
                b.y += ((b.ty - b.y) / dist) * b.speed;
            }
        }

        // 4. 動態碎屑粒子更新
        for (let i = gameState.particles.length - 1; i >= 0; i--) {
            const p = gameState.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life--;
            if (p.life <= 0) gameState.particles.splice(i, 1);
        }
    }

    function spawnEnemy() {
        gameState.enemiesSpawned++;
        // 隨機抽選怪物類型機率 (大波次會高機率給予硬甲驅逐艦)
        let pool = [0, 0, 0, 1, 1];
        if (gameState.wave >= 4) pool.push(1, 2);
        if (gameState.wave >= 8) pool.push(2, 2);
        
        let typeIndex = pool[Math.floor(Math.random() * pool.length)];
        
        // 如果是特定整數尾波次，最後一隻產生大 Boss 首領
        if (gameState.wave % 5 === 0 && gameState.enemiesSpawned === gameState.totalEnemiesInWave) {
            typeIndex = 3;
        }
        
        const template = ENEMY_TYPES[typeIndex];
        const multiplier = 1 + (gameState.wave - 1) * 0.32; // 怪獸隨波次血量增幅
        
        gameState.enemies.push({
            x: path[0].x, y: path[0].y,
            pathIndex: 1,
            type: template.type,
            maxHp: template.hp * multiplier,
            hp: template.hp * multiplier,
            speed: template.speed, baseSpeed: template.speed,
            reward: template.reward, size: template.size, color: template.color,
            slowDuration: 0
        });
    }

    function applySplashDamage(x, y, dmg, type) {
        const radius = type === 'ice' ? 35 : 12; // 冰凍自帶範圍緩速擴散
        
        for (let i = gameState.enemies.length - 1; i >= 0; i--) {
            const e = gameState.enemies[i];
            if (Math.hypot(e.x - x, e.y - y) <= radius) {
                e.hp -= dmg;
                if (type === 'ice') {
                    e.speed = e.baseSpeed * 0.45; // 減速 55%
                    e.slowDuration = 120; // 持續 2 秒
                }
                if (e.hp <= 0) { killEnemy(e); }
            }
        }
        createHitExplosion(x, y, type === 'ice' ? '#00ffaa' : '#ffea00');
    }

    function killEnemy(e) {
        const idx = gameState.enemies.indexOf(e);
        if (idx > -1) {
            gameState.enemies.splice(idx, 1);
            gameState.energy = Math.min(25, gameState.energy + e.reward);
            gameState.killedCount++;
            createDeadExplosion(e.x, e.y, e.color, e.size);
            updateUIBars();
            checkWaveEndCondition();
        }
    }

    function checkWaveEndCondition() {
        if (gameState.enemies.length === 0 && gameState.enemiesSpawned >= gameState.totalEnemiesInWave) {
            if (gameState.wave >= gameState.maxWaves) {
                doVictory();
            } else {
                gameState.wave++;
                generateWaveData();
                updateUIBars();
            }
        }
    }

    // ==========================================
    // 渲染視覺外觀引擎層 (Canvas 2D 繪製)
    // ==========================================
    function drawGameScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. 繪製科幻霓虹行軍路徑
        ctx.beginPath();
        ctx.moveTo(path[0].x, path[0].y);
        for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
        ctx.strokeStyle = 'rgba(26, 54, 93, 0.4)'; ctx.lineWidth = 32; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.stroke();
        
        ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)'; ctx.lineWidth = 4; ctx.stroke();

        // 2. 繪製防禦塔角色主體
        gameState.towers.forEach(t => {
            const isSelected = gameState.selectedTower && gameState.selectedTower.id === t.id;
            
            // 如果點選它，畫出攻擊包圍網圈
            if (isSelected) {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0, 243, 255, 0.05)'; ctx.fill();
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.3)'; ctx.lineWidth = 1; ctx.stroke();
            }
            
            // 繪製防禦塔裝甲外觀
            ctx.beginPath(); ctx.arc(t.x, t.y, 16, 0, Math.PI*2);
            ctx.fillStyle = '#111827'; ctx.strokeStyle = TOWER_DATA[t.type].color;
            ctx.lineWidth = isSelected ? 3 : 2; ctx.fill(); ctx.stroke();
            
            // 繪製等級核心刻印
            ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(t.level, t.x, t.y);
        });

        // 3. 繪製即時「拖移放置」半透明範圍預覽（全新視覺化加強）
        if (isDraggingCard && dragTowerType) {
            const range = TOWER_DATA[dragTowerType].range;
            const isValid = isValidPosition(dragX, dragY);
            
            // 繪製範圍警示圈
            ctx.beginPath();
            ctx.arc(dragX, dragY, range, 0, Math.PI * 2);
            ctx.fillStyle = isValid ? "rgba(0, 243, 255, 0.08)" : "rgba(255, 0, 77, 0.08)";
            ctx.fill();
            ctx.strokeStyle = isValid ? "#00f3ff" : "#ff004d";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // 繪製角色放置預覽點
            ctx.beginPath();
            ctx.arc(dragX, dragY, 14, 0, Math.PI * 2);
            ctx.fillStyle = isValid ? "rgba(0, 243, 255, 0.6)" : "rgba(255, 0, 77, 0.6)";
            ctx.fill();
        }

        // 4. 繪製敵軍星際飛船
        gameState.enemies.forEach(e => {
            ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
            ctx.fillStyle = e.color; ctx.fill();
            
            if (e.slowDuration > 0) { // 被冰凍時的緩速特效外殼
                ctx.strokeStyle = '#00ffaa'; ctx.lineWidth = 2; ctx.stroke();
            }
            
            // 血條外框與填充
            const bw = e.size * 1.6; const bh = 3;
            const bx = e.x - bw / 2; const by = e.y - e.size - 6;
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
            const ratio = Math.max(0, e.hp / e.maxHp);
            ctx.fillStyle = ratio > 0.5 ? '#48bb78' : ratio > 0.2 ? '#ecc94b' : '#f56565';
            ctx.fillRect(bx, by, bw * ratio, bh);
        });

        // 5. 繪製一般防禦飛彈子彈
        gameState.bullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'ice' ? 4 : 3, 0, Math.PI*2);
            ctx.fillStyle = b.color; ctx.fill();
        });

        // 6. 繪製量子雷射不間斷射線
        gameState.lasers.forEach(l => {
            ctx.beginPath(); ctx.moveTo(l.sx, l.sy); ctx.lineTo(l.tx, l.ty);
            ctx.strokeStyle = l.color; ctx.lineWidth = 2.5; ctx.stroke();
        });

        // 7. 繪製爆炸粒子碎屑
        gameState.particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.fill();
            ctx.globalAlpha = 1.0;
        });
    }

    // ==========================================
    // 顆粒特效生成器
    // ==========================================
    function createHitExplosion(x, y, color) {
        for(let i=0; i<4; i++) {
            gameState.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3,
                r: Math.random() * 2 + 1, life: 15, color: color
            });
        }
    }

    function createDeadExplosion(x, y, color, size) {
        const count = size * 1.2;
        for(let i=0; i<count; i++) {
            gameState.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
                r: Math.random() * 3 + 1, life: 25, color: color
            });
        }
    }

    function createUpgradeParticles(x, y) {
        for(let i=0; i<15; i++) {
            gameState.particles.push({
                x: x + (Math.random() - 0.5) * 10, y: y + (Math.random() - 0.5) * 10,
                vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 2.5 - 0.5,
                r: Math.random() * 2.5 + 1, life: 30, color: '#ffd700'
            });
        }
    }

    // ==========================================
    // 結算與畫面關閉動作
    // ==========================================
    function doGameOver() {
        stopGameState();
        document.getElementById('go-wave').innerText = gameState.wave;
        document.getElementById('go-kills').innerText = gameState.killedCount;
        document.getElementById('gameover-screen').classList.add('active');
    }

    function doVictory() {
        stopGameState();
        document.getElementById('victory-screen').classList.add('active');
    }

    function hideResultScreens() {
        document.getElementById('gameover-screen').classList.remove('active');
        document.getElementById('victory-screen').classList.remove('active');
    }

    window.addEventListener('resize', () => { if(gameState.running) resizeCanvas(); });
    window.addEventListener('load', () => { initCardIcons(); updateUIBars(); });
</script>
